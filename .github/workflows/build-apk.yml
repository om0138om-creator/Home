name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  APP_NAME: "Font Studio"
  PACKAGE_NAME: "com.fontstudio.app"
  # هذا المتغير سيجبر كوردوفا على استخدام إصدار Gradle 8.4 المستقر وتجنب خطأ XmlParser
  CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: "https://services.gradle.org/distributions/gradle-8.4-all.zip"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      # =====================================================
      # 📥 Checkout Repository
      # =====================================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =====================================================
      # ☕ Setup Java JDK
      # =====================================================
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # =====================================================
      # 🔧 Setup Gradle
      # =====================================================
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      # =====================================================
      # 📱 Setup Android SDK
      # =====================================================
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # =====================================================
      # 🟢 Setup Node.js
      # =====================================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # =====================================================
      # 📦 Install Cordova
      # =====================================================
      - name: Install Cordova
        run: npm install -g cordova@12.0.0

      # =====================================================
      # 📁 Create Cordova Project
      # =====================================================
      - name: Create Cordova Project
        run: |
          cordova create cordova-app ${{ env.PACKAGE_NAME }} "${{ env.APP_NAME }}"
          echo "✅ Cordova project created"

      # =====================================================
      # 📋 Copy Web Files
      # =====================================================
      - name: Copy Web Files
        run: |
          rm -rf cordova-app/www/*
          
          cp index.html cordova-app/www/
          
          mkdir -p cordova-app/www/js
          if [ -d "js" ]; then
            cp -r js/* cordova-app/www/js/
          fi
          
          mkdir -p cordova-app/www/icons
          if [ -d "icons" ]; then
            cp -r icons/* cordova-app/www/icons/ 2>/dev/null || true
          fi
          
          [ -f "manifest.json" ] && cp manifest.json cordova-app/www/
          [ -f "sw.js" ] && cp sw.js cordova-app/www/
          
          echo "✅ Files copied"
          ls -la cordova-app/www/

      # =====================================================
      # 🎨 Generate Icons
      # =====================================================
      - name: Generate App Icons
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          
          mkdir -p cordova-app/www/icons
          
          cat > /tmp/icon.svg << 'ICONEOF'
          <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#6366f1"/>
                <stop offset="50%" style="stop-color:#8b5cf6"/>
                <stop offset="100%" style="stop-color:#a855f7"/>
              </linearGradient>
            </defs>
            <rect width="512" height="512" rx="100" fill="url(#bg)"/>
            <text x="256" y="320" text-anchor="middle" fill="white" font-size="220" font-weight="bold" font-family="Arial">F</text>
            <circle cx="420" cy="120" r="50" fill="#22c55e"/>
            <path d="M395 120 L410 135 L445 100" stroke="white" stroke-width="12" fill="none" stroke-linecap="round"/>
          </svg>
          ICONEOF
          
          for size in 72 96 128 144 152 192 384 512; do
            convert -background none -density 384 /tmp/icon.svg -resize ${size}x${size} cordova-app/www/icons/icon-${size}.png
          done
          
          convert -size 1080x1920 'xc:#030712' cordova-app/www/icons/splash-portrait.png
          
          echo "✅ Icons generated"

      # =====================================================
      # 📝 Create Config.xml
      # =====================================================
      - name: Create Cordova Config
        run: |
          cat > cordova-app/config.xml << 'CONFIGEOF'
          <?xml version='1.0' encoding='utf-8'?>
          <widget id="com.fontstudio.app" version="1.0.0"
                  xmlns="http://www.w3.org/ns/widgets" 
                  xmlns:cdv="http://cordova.apache.org/ns/1.0"
                  xmlns:android="http://schemas.android.com/apk/res/android">
              
              <name>فونت ستوديو</name>
              <description>تطبيق احترافي لتصميم الصور</description>
              <author email="support@fontstudio.app">Font Studio Team</author>
              
              <content src="index.html" />
              
              <access origin="*" />
              <allow-intent href="http://*/*" />
              <allow-intent href="https://*/*" />
              <allow-navigation href="*" />
              
              <preference name="Orientation" value="default" />
              <preference name="BackgroundColor" value="#030712" />
              <preference name="AndroidLaunchMode" value="singleTop" />
              <preference name="android-minSdkVersion" value="24" />
              <preference name="android-targetSdkVersion" value="33" />
              <preference name="GradlePluginGoogleServicesEnabled" value="false" />
              
              <platform name="android">
                  <icon src="www/icons/icon-72.png" density="ldpi" />
                  <icon src="www/icons/icon-96.png" density="mdpi" />
                  <icon src="www/icons/icon-144.png" density="hdpi" />
                  <icon src="www/icons/icon-192.png" density="xhdpi" />
                  <icon src="www/icons/icon-384.png" density="xxhdpi" />
                  <icon src="www/icons/icon-512.png" density="xxxhdpi" />
                  
                  <preference name="AndroidWindowSplashScreenAnimatedIcon" value="www/icons/icon-512.png" />
                  <preference name="AndroidWindowSplashScreenBackground" value="#030712" />
              </platform>
          </widget>
          CONFIGEOF
          echo "✅ Config created"

      # =====================================================
      # 📱 Add Android Platform
      # =====================================================
      - name: Add Android Platform
        run: |
          cd cordova-app
          cordova platform add android@12.0.1
          echo "✅ Android platform added"

      # =====================================================
      # 🔌 Add Plugins
      # =====================================================
      - name: Add Cordova Plugins
        run: |
          cd cordova-app
          cordova plugin add cordova-plugin-device || true
          cordova plugin add cordova-plugin-statusbar || true
          echo "✅ Plugins added"

      # =====================================================
      # 🔨 Build Debug APK
      # =====================================================
      - name: Build Debug APK
        run: |
          cd cordova-app
          cordova build android --debug --verbose
          echo "✅ Debug APK built"

      # =====================================================
      # 🔨 Build Release APK
      # =====================================================
      - name: Build Release APK
        run: |
          cd cordova-app
          cordova build android --release -- --packageType=apk
          echo "✅ Release APK built"

      # =====================================================
      # 📋 List APK Files
      # =====================================================
      - name: List APK Files
        run: |
          echo "📦 APK Files:"
          find cordova-app/platforms/android -name "*.apk" -type f -exec ls -lh {} \;

      # =====================================================
      # 📤 Upload Debug APK
      # =====================================================
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: font-studio-debug
          path: cordova-app/platforms/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

      # =====================================================
      # 📤 Upload Release APK
      # =====================================================
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: font-studio-release
          path: cordova-app/platforms/android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: warn

      # =====================================================
      # 🏷️ Create Release
      # =====================================================
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            cordova-app/platforms/android/app/build/outputs/apk/debug/*.apk
            cordova-app/platforms/android/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
